## Adapted from _template.subdomain.conf.sample
## Version 2025/07/18

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name journal.jadestar.dev;

    include /config/nginx/ssl.conf;
    client_max_body_size 0;

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /config/nginx/journal.htpasswd;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 10.169.0.3;
        set $upstream_port 3050;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
