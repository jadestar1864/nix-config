## Adapted from _template.subdomain.conf.sample
## Version 2025/07/18

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name journal.jadestar.dev;

    include /config/nginx/ssl.conf;
    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 10.169.0.3;
        set $upstream_port 3050;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        auth_request /tinyauth;
        error_page 401 = @tinyauth_login;
        error_page 403 = @tinyauth_unauthorized;
    }


    location ~ ^/(service_worker\.js|\.client/.*)$ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 10.169.0.3;
        set $upstream_port 3050;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    location /tinyauth {
        # Pass request to Tinyauth
        proxy_pass http://127.0.0.1:3000/api/auth/nginx;

        # Pass the request headers
        proxy_set_header x-forwarded-proto $scheme;
        proxy_set_header x-forwarded-host $http_host;
        proxy_set_header x-forwarded-uri $request_uri;
    }

    # Tinyauth login redirect
    location @tinyauth_login {
        return 302 http://tinyauth.jadestar.dev/login?redirect_uri=$scheme://$http_host$request_uri;
    }

    location @tinyauth_unauthorized {
        return 302 http://tinyauth.jadestar.dev/unauthorized?username=unavailable;
    }
}
